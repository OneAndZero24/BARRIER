# =============================================================================
# wandb Sweep — Flux InTAct NSFW Erasure
# =============================================================================
# Usage:
#   cd Flux
#   wandb sweep configs/intact/sweep_nsfw.yaml
#   wandb agent <sweep-id>
# =============================================================================

program: intact_pipeline.py
method: grid
name: flux-nsfw-sweep
entity: oneandzero24   # must match your WANDB entity
project: intact-flux

command:
  - ${env}
  - python
  - ${program}
  - "--config"
  - "configs/intact/pipeline_nsfw.yaml"

parameters:
  unlearn.learning_rate:
    values: [1.0e-5, 5.0e-5, 5.0e-6, 1.0e-4]
  unlearn.max_train_steps:
    values: [100, 200, 500]
  intact.lambda_interval:
    values: [0.5, 1.0, 5.0, 10.0, 100.0]
  unlearn.base_method:
    values: ["rl"]  # RL loss for NSFW
  # you might also sweep different target sets if desired
