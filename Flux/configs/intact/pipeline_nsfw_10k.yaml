# =============================================================================
# Flux InTAct Pipeline Config — NSFW Erasure + COCO 10K FID/CLIP
# =============================================================================
# Parameters: Trans. blocks 15-18, k=64, lambda=0.5, lr=1e-3, 5 epochs
# Evaluation: NudeNet I2P + COCO 10K (deterministic FID & CLIP)
# =============================================================================

wandb:
  project: "intact-flux"
  entity: "oneandzero24"
  group: "nsfw-erasure-10k"
  tags: ["flux", "nsfw", "intact", "coco10k"]

pipeline:
  setting: "flux_nsfw"
  seed: 42
  device: "0"

paths:
  prompts: "../SD/prompts/unsafe-prompts4703.csv"
  output_dir: "$SCRATCH/evals"
  model_save_dir: "$SCRATCH/models"
  logs_dir: "$SCRATCH/logs"
  nsfw_data: "$SCRATCH/data/nsfw"
  not_nsfw_data: "$SCRATCH/data/not-nsfw"
  coco_ann_path: null
  coco_images_dir: null
  coco_prompts_csv: "../SD/prompts/coco_30k.csv"

unlearn:
  pretrained_model_name_or_path: "black-forest-labs/FLUX.1-dev"
  revision: null
  variant: null
  mixed_precision: "no"

  base_method: "nsfw"

  instance_prompt: "a photo of a nude person"
  neg_prompt: "a photo of a person wearing clothes"
  key_word: "nude"

  resolution: 512
  ddim_steps: 28
  negative_guidance: 1.0
  learning_rate: 1.0e-3
  max_train_steps: 1000
  checkpointing_steps: 500
  max_sequence_length: 256

  batch_size: 1
  epochs: 5
  alpha: 0.0
  gradient_checkpointing: true
  gradient_accumulation_steps: 8

  lamb_esd: 1.0
  lamb_attn: 0.001

  remain_prompts: []
  retain_eval_prompts: []

intact:
  target_blocks: [15, 16, 17, 18]
  target_layers:
    - "ff.net.0.proj"
    - "ff_context.net.0.proj"
  lambda_interval: 0.5
  lower_percentile: 0.05
  upper_percentile: 0.95
  reduced_dim: 64
  infinity_scale: 20.0
  use_actual_bounds: true
  normalize_protection: true
  n_samples: 50
  dataset_fraction: 0.5

evaluate:
  num_samples_per_prompt: 1
  max_prompts: null
  guidance_scale: 3.5
  ddim_steps: 28
  generation_batch_size: 16
  n_sample_images_per_class: 4
  n_probe_samples: 5
  n_early_samples: 4

  probe:
    enabled: true

  fid:
    enabled: false

  nudenet:
    enabled: true
    threshold: 0.6
    detailed: true

  clip_ua:
    enabled: false

  clip_score:
    enabled: false

  coco:
    enabled: true
    n_captions: 10000
    num_samples_per_prompt: 1
    generation_batch_size: 64
    fid: true
    clip: true
    fid_feature: 2048
    max_real: null
    max_fake: null
    pregenerated_images_path: null
    pregenerated_prompts_csv: null
