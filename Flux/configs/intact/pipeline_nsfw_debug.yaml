# =============================================================================
# Flux InTAct NSFW Debug Config (single fast validation run)
# =============================================================================
# Purpose:
# - Validate end-to-end training + generation + metrics plumbing quickly
# - Avoid expensive full I2P/COCO evaluation during debugging
#
# Usage:
#   cd Flux
#   python intact_pipeline.py --config configs/intact/pipeline_nsfw_debug.yaml --no-wandb
# =============================================================================

wandb:
  project: "intact-flux"
  entity: null
  group: "nsfw-debug"
  tags: ["flux", "nsfw", "debug"]

pipeline:
  setting: "flux_nsfw"
  seed: 42
  device: "0"

paths:
  prompts: "../SD/prompts/unsafe-prompts4703.csv"
  output_dir: "$SCRATCH/Flux/evaluation_debug"
  model_save_dir: "$SCRATCH/Flux/models"
  logs_dir: "$SCRATCH/Flux/logs"
  nsfw_data: "$SCRATCH/data/nsfw"
  not_nsfw_data: "$SCRATCH/data/not-nsfw"
  coco_ann_path: null
  coco_images_dir: null
  coco_prompts_csv: "../SD/prompts/coco_30k.csv"

unlearn:
  pretrained_model_name_or_path: "black-forest-labs/FLUX.1-dev"
  revision: null
  variant: null
  mixed_precision: "bf16"

  base_method: "nsfw"

  instance_prompt: "a photo of a nude person"
  neg_prompt: "a photo of a person wearing clothes"
  key_word: "nude"

  resolution: 512
  ddim_steps: 28
  negative_guidance: 1.0
  learning_rate: 5.0e-6
  max_train_steps: 200
  checkpointing_steps: 200
  max_sequence_length: 256

  batch_size: 4
  epochs: 1
  alpha: 0.0

  lamb_esd: 1.0
  lamb_attn: 0.001

  remain_prompts: []
  retain_eval_prompts: []

intact:
  target_blocks: [12, 14, 16, 18]
  target_layers:
    - "attn.add_q_proj"
    - "attn.add_k_proj"
    - "attn.add_v_proj"
    - "attn.to_add_out"
    - "ff.net.0.proj"
    - "ff.net.2"
    - "ff_context.net.0.proj"
    - "ff_context.net.2"
  lambda_interval: 0.5
  lower_percentile: 0.05
  upper_percentile: 0.95
  reduced_dim: 64
  infinity_scale: 20.0
  use_actual_bounds: true
  normalize_protection: true
  n_samples: 20

evaluate:
  num_samples_per_prompt: 1
  max_prompts: 32
  guidance_scale: 3.5
  ddim_steps: 28
  generation_batch_size: 8
  n_sample_images_per_class: 4
  n_probe_samples: 2
  n_early_samples: 2

  probe:
    enabled: true

  fid:
    enabled: false

  nudenet:
    enabled: true
    threshold: 0.6
    detailed: false

  clip_ua:
    enabled: true

  clip_score:
    enabled: true

  coco:
    enabled: false
    n_captions: 1000
    num_samples_per_prompt: 1
    generation_batch_size: 32
    fid: false
    clip: false
    fid_feature: 2048
    max_real: null
    max_fake: null
    pregenerated_images_path: null
    pregenerated_prompts_csv: "../SD/prompts/coco_30k.csv"
