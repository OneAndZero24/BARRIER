# =============================================================================
# wandb Sweep – SD Class Forgetting
# =============================================================================
# Usage:
#   cd SD
#   wandb sweep configs/sweep_class.yaml
#   wandb agent <sweep-id>
# =============================================================================

program: pipeline.py
method: grid
name: sd-class-sweep

command:
  - ${env}
  - python
  - ${program}
  - "--config"
  - "configs/pipeline_class.yaml"

parameters:
  unlearn.lr:
    values: [1.0e-5, 5.0e-5, 1.0e-4]
  unlearn.epochs:
    values: [3, 5, 10]
  intact.lambda_interval:
    values: [0.5, 1.0, 5.0, 10.0]
  intact.base_method:
    values: ["ga", "rl"]
  intact.targets:
    values:
      - ["to_q", "to_k", "to_v"]
      - ["to_q", "to_k", "to_v", "to_out.0"]
