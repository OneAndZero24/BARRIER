# =============================================================================
# wandb Sweep – Artist Unlearning + LPIPS Evaluation
# =============================================================================
# Each sweep trial trains unlearning for Kelly McKernan and Van Gogh 
# separately, then computes LPIPS_e (erased), LPIPS_u (unerased) and 
# LPIPS_d = LPIPS_e - LPIPS_u per artist.
#
# Objective: maximize LPIPS_d  (high divergence on erased, low on unerased).
# =============================================================================

program: scripts/lpips_eval_pipeline.py
method: bayes
metric:
  name: mean_LPIPS_d
  goal: maximize

parameters:
  unlearn.epochs:
    distribution: int_uniform
    min: 3
    max: 15

  unlearn.lr:
    distribution: log_uniform_values
    min: 5.0e-6
    max: 1.0e-4

  intact.lambda_interval:
    distribution: log_uniform_values
    min: 1.0e-4
    max: 5.0e-1

  intact.reduced_dim:
    values: [16, 32, 64, 128, 256]


command:
  - ${env}
  - python
  - ${program}
  - "--config"
  - "configs/pipeline_artists.yaml"