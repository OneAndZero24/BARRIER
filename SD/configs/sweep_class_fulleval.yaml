# =============================================================================
# wandb Sweep – SD Class Forgetting Full Evaluation
# =============================================================================
# Each sweep trial runs the full 10-class forget/evaluate loop and logs the
# averaged metrics. The sweep objective is to keep UA near 98% and the
# remaining-class average near 80%.
# =============================================================================

program: scripts/run_class_fulleval_sweep.py
method: grid
name: sd-class-fulleval-30
entity: oneandzero24
project: intact-sd

command:
  - ${env}
  - python
  - ${program}
  - "--config"
  - "configs/pipeline_class_fulleval.yaml"

metric:
  name: target_gap
  goal: minimize

parameters:
  unlearn.lr:
    values: [1.0e-5, 5e-5, 1.0e-4, 5.0e-6, 1.0e-6]
  unlearn.epochs:
    values: [3, 10, 20]
  intact.lambda_interval:
    values: [0.1, 1.0]