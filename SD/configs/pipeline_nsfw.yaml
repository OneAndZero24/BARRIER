# =============================================================================
# SD NSFW Concept Removal Pipeline Config
# =============================================================================
# Usage:
#   cd SD
#   python pipeline.py --config configs/pipeline_nsfw.yaml
# =============================================================================

wandb:
  project: "intact-sd"
  entity: oneandzero24                        # set to your wandb entity
  group: "nsfw-removal"
  tags: ["sd", "nsfw", "intact"]

pipeline:
  setting: "sd_nsfw"
  seed: 42
  device: "0"

paths:
  sd_config: "configs/stable-diffusion/v1-intact.yaml"
  sd_ckpt: "models/ldm/stable-diffusion-v1/sd-v1-4-full-ema.ckpt"
  diffusers_config: "diffusers_unet_config.json"
  nsfw_prompts: "prompts/unsafe-prompts4703.csv"
  prompts: "prompts/imagenette.csv"     # for classification eval (general quality)
  output_dir: "/shared/results/common/miksa/intact/SD/evaluation"  # Where generated images are saved
  model_save_dir: "/shared/results/common/miksa/intact/SD/models"  # Where model checkpoints are saved
  logs_dir: "/shared/results/common/miksa/intact/SD/logs"          # Where training logs/losses are saved
  nsfw_data: "/shared/results/common/miksa/intact/SD/data/nsfw"                # NSFW training images (forget set)
  not_nsfw_data: "/shared/results/common/miksa/intact/SD/data/not-nsfw"        # Clothed person images (remain set)

unlearn:
  method: "intact"                      # intact | nsfw
  alpha: 0.0
  batch_size: 8
  epochs: 5
  lr: 5.0e-6
  image_size: 512

intact:
  base_method: "nsfw"
  targets: ['attn2.to_q', 'attn2.to_k', 'attn2.to_v']  
  lambda_interval: 10.0
  lower_percentile: 0.05
  upper_percentile: 0.95
  reduced_dim: 64
  infinity_scale: 20.0
  use_actual_bounds: true
  normalize_protection: true

evaluate:
  num_samples_per_prompt: 10
  guidance_scale: 7.5
  ddim_steps: 100
  n_sample_images_per_class: 4       # how many example images to upload to wandb per group
  n_probe_samples: 10                # per-prompt samples for nude/clothed probe (total = 10 × n_probe_samples per prompt)

  fid:
    enabled: true
    max_real: 100                    # null = use all NOT_NSFW reference images
    max_fake: 100                    # null = use all clothed-prompt generated images

  nudenet:
    enabled: true
    threshold: 0.0
