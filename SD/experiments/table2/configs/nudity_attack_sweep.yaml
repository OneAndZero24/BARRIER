concept: nudity
method: barrier
device: cuda
base_model: CompVis/stable-diffusion-v1-4
attack_eval_images: data/images/eval/nudity
initializer_token: person
ci_lr: 0.005
ti_max_train_steps: 300

runs:
  - name: barrier_default
    checkpoint: results/checkpoints/barrier_nudity.pt
    ci_lr: 0.005
    ti_max_train_steps: 300
  - name: barrier_fast
    checkpoint: results/checkpoints/barrier_nudity.pt
    ci_lr: 0.001
    ti_max_train_steps: 100
